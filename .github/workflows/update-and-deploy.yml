name: Update deals & deploy

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "src/**"
      - "_recipes/**"
      - "public/**"
      - "*.json"
      - "*.js"
      - ".github/workflows/**"
      - "!public/data/**"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  scrape:
    name: Refresh structured-store data
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Install Playwright's Chromium (Jumbo/Plus/Aldi/Lidl DOM reads)
        working-directory: backend
        run: python -m playwright install --with-deps chromium

      - name: Run structured scrapers (no vision LLM needed)
        working-directory: backend
        run: python main.py --stores albert-heijn lidl dirk jumbo plus aldi

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data
          git diff --staged --quiet || git commit -m "chore: refresh deal data"
          git push

  build-and-deploy:
    name: Build site & deploy to Pages
    needs: scrape
    if: always() && (needs.scrape.result == 'success' || needs.scrape.result == 'skipped')
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
